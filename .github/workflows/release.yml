name: Release

on:
  push:
    tags:
        - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  test-and-build:
    name: Test & Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hxdi
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: hxdi
            packages: musl-tools
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: hxdi
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: hxdi
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: hxdi.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        if: matrix.packages != ''
        run: sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Run tests
        # Cross-compiled targets (aarch64 on x86 runner) can't run natively;
        # skip tests only for that combination.
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test --tests

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          STEM="hxdi-${TAG}-${{ matrix.target }}"
          SRC="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv "$SRC" "${STEM}.exe"
            echo "ASSET=${STEM}.exe" >> "$GITHUB_ENV"
          else
            mv "$SRC" "${STEM}"
            echo "ASSET=${STEM}" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
